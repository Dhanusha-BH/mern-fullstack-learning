<!DOCTYPE html>
<html>
<head>
    <title>My Projects</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            color: #333;
        }

        h1 {
            margin-top: 50px;
            font-size: 2.5rem;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        .card {
            background: white;
            color: #333;
            padding: 25px;
            margin: 15px;
            width: 280px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #ff7e5f;
        }

        a {
            text-decoration: none;
            background: #ff7e5f;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            transition: 0.3s;
        }

        a:hover {
            background: #ff9a76;
        }
    </style>
</head>
<body>

<h1> My Web Projects</h1>

<div class="container">

    <div class="card">
        <h3>📄 Portfolio Website</h3>
        <a href="portfolio/index.html">View Project</a>
    </div>

    <div class="card">
        <h3>💳 Visiting Card</h3>
        <a href="visiting_card/index.html">View Project</a>
    </div>

    <div class="card">
        <h3>📚 Study Planner</h3>
        <a href="study-planner/index.html">View Project</a>
    </div>

</div>

</body>
</html>
